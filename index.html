<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eldorado High School - News Broadcasting Club</title>
<style>
:root{
  --primary:#6b0f1a; --primary-soft:#8f2333; --accent:#f2c94c;
  --bg:#f4f1ec; --card:#ffffff; --text:#2f2f2f; --muted:#666;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;}
html,body{height:100%;scroll-behavior:smooth;overflow-x:hidden;}
body{background:var(--bg);color:var(--text);line-height:1.7;}
.school-header{position:fixed;top:0;width:100%;background:#660032;color:white;padding:14px 6%;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--accent);z-index:1000;}
.header-left{display:flex;align-items:center;gap:14px;}
.header-left img{height:50px;}
.header-text span{font-size:.8rem;color:var(--accent);}
.school-header nav a{color:white;text-decoration:none;margin-left:20px;cursor:pointer;}
.school-header nav a:hover{color:var(--accent);}
#newsBarContainer{position:fixed;top:73px;width:100%;background:linear-gradient(90deg,#6b0f1a,#8f2333);height:50px;display:flex;align-items:center;border-bottom:2px solid var(--accent);z-index:999;}
#newsBar{white-space:nowrap;color:var(--accent);font-weight:600;padding-left:100%;animation:scrollNews 20s linear infinite;}
@keyframes scrollNews{0%{transform:translateX(100%);}100%{transform:translateX(-100%);}}
main{padding-top:123px;}
section{min-height:100vh;padding:8% 6%;display:flex;flex-direction:column;justify-content:center;align-items:center;}
.hero{background:linear-gradient(135deg,var(--primary),var(--primary-soft));color:white;text-align:center;}
.hero button{background:var(--accent);color:var(--primary);border:none;padding:14px 28px;border-radius:8px;margin-top:10px;cursor:pointer;}
.broadcasts{background:var(--card);border-radius:18px;box-shadow:0 10px 30px rgba(0,0,0,.05);width:90%;max-width:1000px;margin:40px auto;text-align:center;}
.video-card{background:#f0f0f0;border-radius:12px;padding:12px;margin:12px 0;}
.video-card iframe{width:100%;height:50vh;border-radius:10px;border:none;}
.video-card h3{margin:6px 0;}
.video-card p{margin:4px 0;color:#333;}
.team-grid{width:90%;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:40px;}
.member{background:white;padding:20px;border-radius:18px;text-align:center;position:relative;}
.join{background:#ebe7e2;border-radius:18px;text-align:center;}
.join input{padding:12px;margin:8px;width:260px;border-radius:8px;border:1px solid #ddd;}
.join button{background:var(--primary);color:white;border:none;padding:12px 24px;border-radius:8px;margin-top:10px;cursor:pointer;}
footer{background:var(--primary);color:white;text-align:center;padding:18px;margin-top:20px;}
.admin-panel{background:#fff;padding:20px;border-radius:12px;margin-top:20px;width:90%;max-width:1000px;}
.admin-panel h3{margin-bottom:12px;}
.admin-panel input, .admin-panel button, .admin-panel textarea{margin:4px; padding:6px 10px; border-radius:6px; border:1px solid #ccc;}
#exportBox{width:100%;height:200px;background:#222;color:#fff;padding:10px;border-radius:8px;border:none;font-family:monospace;margin-top:10px;resize:vertical;}
.video-item, .team-item, .join-item{display:flex;align-items:center;justify-content:space-between;padding:6px;margin:4px 0;background:#f0f0f0;border-radius:6px;}
.video-item button, .team-item button, .join-item button{margin-left:4px;}
</style>
</head>
<body>

<header class="school-header">
<div class="header-left">
<img src="maroon.webp" alt="School Logo">
<div class="header-text">
<h1>Eldorado High School</h1>
<span>News Broadcasting Club</span>
</div>
</div>
<nav>
<a onclick="scrollToSection('hero')">Home</a>
<a onclick="scrollToSection('broadcasts')">Broadcasts</a>
<a onclick="scrollToSection('team')">Team</a>
<a onclick="scrollToSection('join')">Join</a>
<a onclick="toggleAdmin()">Admin</a>
</nav>
</header>

<div id="newsBarContainer">
<div id="newsBar"></div>
</div>

<main>
<section id="hero" class="hero">
<h1 id="heroTitle"></h1>
<p id="heroDesc"></p>
<button onclick="scrollToSection('broadcasts')">Watch Broadcast</button>
</section>

<section id="broadcasts" class="broadcasts">
<h2>Latest Broadcasts</h2>
<div id="videosContainer"></div>
</section>

<section id="team">
<h2>Meet the Team</h2>
<div class="team-grid" id="teamGrid"></div>
</section>

<section id="join" class="join">
<h2>Join the Club</h2>
<form onsubmit="submitForm(event)">
<input type="text" id="name" placeholder="Your Name" required>
<input type="email" id="email" placeholder="Your Email" required><br>
<button type="submit">Submit</button>
</form>
</section>
</main>

<footer>© 2026 Eldorado High School Broadcasting Club</footer>

<div class="admin-panel" id="adminPanel" style="display:none;">
<h3>Admin Login</h3>
<input type="text" id="adminUser" placeholder="Username">
<input type="password" id="adminPass" placeholder="Password">
<button onclick="checkAdmin()">Login</button>

<div id="adminControls" style="display:none;margin-top:20px;">
<h3>Edit Site</h3>
<button onclick="editHero()">Edit Hero Section</button>
<button onclick="editNewsBar()">Edit News Bar</button>

<h4>Broadcast Videos</h4>
<div id="videoControls"></div>
<input type="text" id="newVideoURL" placeholder="Video URL">
<input type="text" id="newVideoTitle" placeholder="Video Title">
<textarea id="newVideoTranscript" placeholder="Video Transcript"></textarea>
<button onclick="addVideo()">Add Video</button>

<h4>Team Members</h4>
<div id="teamControls"></div>
<input type="text" id="newMemberName" placeholder="Name">
<input type="text" id="newMemberRole" placeholder="Role">
<button onclick="addTeamMember()">Add Member</button>

<h4>Join Submissions</h4>
<div id="joinControls"></div>

<h4>Export Updated Site</h4>
<button onclick="exportSiteCode()">Generate Export Code</button>
<textarea id="exportBox" readonly placeholder="Updated site code will appear here..."></textarea>
</div>
</div>

<script>
let siteData = {
  heroTitle:"Welcome to the News Broadcasting Club",
  heroDesc:"Delivering school stories. Sharing student voices.",
  newsBar:"Welcome to Eldorado News ⚡ Student Stories ⚡ Stay Tuned",
  team:[],
  videos:[],
  joins:[]
};

if(localStorage.getItem("siteData")){
  siteData=JSON.parse(localStorage.getItem("siteData"));
}

function saveData(){ localStorage.setItem("siteData",JSON.stringify(siteData)); }
function loadData(){
  document.getElementById("heroTitle").textContent = siteData.heroTitle;
  document.getElementById("heroDesc").textContent = siteData.heroDesc;
  document.getElementById("newsBar").textContent = siteData.newsBar;
  renderTeam(); renderVideos(); renderJoin();
}

function toggleAdmin(){ let panel=document.getElementById("adminPanel"); panel.style.display=panel.style.display==="block"?"none":"block"; }
function scrollToSection(id){ document.getElementById(id).scrollIntoView({behavior:"smooth"}); }
function submitForm(e){ e.preventDefault(); siteData.joins.push({name:document.getElementById("name").value,email:document.getElementById("email").value}); saveData(); alert("Submitted!"); e.target.reset(); renderJoin(); }

function checkAdmin(){
  if(adminUser.value==="admin1973" && adminPass.value==="eldo2026"){
    document.getElementById("adminControls").style.display="block";
    renderAdminTeam(); renderAdminVideos(); renderAdminJoin();
  } else { alert("Wrong login"); }
}

// HERO & NEWS
function editHero(){ const t=prompt("Hero Title:",siteData.heroTitle); if(t) siteData.heroTitle=t; const d=prompt("Hero Description:",siteData.heroDesc); if(d) siteData.heroDesc=d; saveData(); loadData(); }
function editNewsBar(){ const t=prompt("News Bar Text:",siteData.newsBar); if(t) siteData.newsBar=t; saveData(); loadData(); }

// TEAM
function renderTeam(){ const grid=document.getElementById("teamGrid"); grid.innerHTML=""; siteData.team.forEach(m=>{const div=document.createElement("div"); div.className="member"; div.innerHTML=`<h3>${m.name}</h3><p>${m.role}</p>`; grid.appendChild(div); }); }
function renderAdminTeam(){ const container=document.getElementById("teamControls"); container.innerHTML=""; siteData.team.forEach((m,i)=>{ const div=document.createElement("div"); div.className="team-item"; div.textContent=`${m.name} - ${m.role}`; const editBtn=document.createElement("button"); editBtn.textContent="Edit"; editBtn.onclick=()=>{let n=prompt("Name:",m.name); let r=prompt("Role:",m.role); if(n)m.name=n;if(r)m.role=r; saveData(); loadData(); renderAdminTeam();}; const delBtn=document.createElement("button"); delBtn.textContent="Delete"; delBtn.onclick=()=>{siteData.team.splice(i,1); saveData(); loadData(); renderAdminTeam();}; div.appendChild(editBtn); div.appendChild(delBtn); container.appendChild(div); }); }
function addTeamMember(){ const n=document.getElementById("newMemberName").value.trim(); const r=document.getElementById("newMemberRole").value.trim(); if(n&&r){ siteData.team.push({name:n,role:r}); saveData(); loadData(); renderAdminTeam(); } document.getElementById("newMemberName").value=""; document.getElementById("newMemberRole").value=""; }

// VIDEOS
function renderVideos(){ const container=document.getElementById("videosContainer"); container.innerHTML=""; siteData.videos.forEach(v=>{ const card=document.createElement("div"); card.className="video-card"; card.innerHTML=`<h3>${v.title}</h3><iframe src="${v.url}" allowfullscreen></iframe><p>${v.transcript}</p>`; container.appendChild(card); }); }
function renderAdminVideos(){ const container=document.getElementById("videoControls"); container.innerHTML=""; siteData.videos.forEach((v,i)=>{ const div=document.createElement("div"); div.className="video-item"; div.textContent=v.title; const up=document.createElement("button"); up.textContent="↑"; up.onclick=()=>{if(i>0){[siteData.videos[i-1],siteData.videos[i]]=[siteData.videos[i],siteData.videos[i-1]]; saveData(); renderVideos(); renderAdminVideos();}}; const down=document.createElement("button"); down.textContent="↓"; down.onclick=()=>{if(i<siteData.videos.length-1){[siteData.videos[i+1],siteData.videos[i]]=[siteData.videos[i],siteData.videos[i+1]]; saveData(); renderVideos(); renderAdminVideos();}}; const edit=document.createElement("button"); edit.textContent="Edit"; edit.onclick=()=>{ let newTitle=prompt("Video Title:",v.title); let newURL=prompt("Video URL:",v.url); let newTranscript=prompt("Transcript:",v.transcript); if(newTitle)v.title=newTitle;if(newURL)v.url=newURL;if(newTranscript)v.transcript=newTranscript; saveData(); renderVideos(); renderAdminVideos();}; const del=document.createElement("button"); del.textContent="Delete"; del.onclick=()=>{siteData.videos.splice(i,1); saveData(); renderVideos(); renderAdminVideos();}; div.appendChild(up); div.appendChild(down); div.appendChild(edit); div.appendChild(del); container.appendChild(div); }); }
function addVideo(){ const url=document.getElementById("newVideoURL").value.trim(); const title=document.getElementById("newVideoTitle").value.trim(); const transcript=document.getElementById("newVideoTranscript").value.trim(); if(url && title){ siteData.videos.push({url,title,transcript}); saveData(); renderVideos(); renderAdminVideos(); } document.getElementById("newVideoURL").value=""; document.getElementById("newVideoTitle").value=""; document.getElementById("newVideoTranscript").value=""; }

// JOIN
function renderJoin(){ const container=document.getElementById("joinControls"); container.innerHTML=""; siteData.joins.forEach((j,i)=>{ const div=document.createElement("div"); div.className="join-item"; div.textContent=`${j.name} - ${j.email}`; container.appendChild(div); }); }
function renderAdminJoin(){ const container=document.getElementById("joinControls"); container.innerHTML=""; siteData.joins.forEach((j,i)=>{ const div=document.createElement("div"); div.className="join-item"; div.textContent=`${j.name} - ${j.email}`; const edit=document.createElement("button"); edit.textContent="Edit"; edit.onclick=()=>{ let n=prompt("Name:",j.name); let e=prompt("Email:",j.email); if(n) j.name=n; if(e) j.email=e; saveData(); renderJoin(); renderAdminJoin(); }; const del=document.createElement("button"); del.textContent="Delete"; del.onclick=()=>{siteData.joins.splice(i,1); saveData(); renderJoin(); renderAdminJoin();}; div.appendChild(edit); div.appendChild(del); container.appendChild(div); }); }

// EXPORT
function exportSiteCode(){ 
    const newHTML = document.documentElement.outerHTML;
    document.getElementById("exportBox").value = newHTML;
}

loadData();
</script>

</body>
</html>

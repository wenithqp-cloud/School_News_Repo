.video-scroll button:hover {background:#ffd700;color:#7a0019;transform:scale(1.05);}

/* ================= TEAM ================= */
.team {background:#fafafa;width:100%;padding-bottom:40px;}

.member img {width:120px;height:120px;border-radius:50%;object-fit:cover;margin-bottom:10px;transition:transform 0.3s ease;}
.member h3 {margin:5px 0 0 0; position:relative;}

/* ================= TOOLTIP ================= */

/* ================= ABOUT US ================= */

/* ================= FOOTER ================= */
footer {background:#7a0019;color:white;text-align:center;padding:15px;}

// ================= TEAM MEMBERS =================
function loadTeamMembers(){
  const tM=JSON.parse(localStorage.getItem("teamMembers"))||[];
  const grid=document.getElementById("teamGrid"); grid.innerHTML="";
  const manager=document.getElementById("teamManager"); manager.innerHTML="";
  const tooltip=document.getElementById("tooltip");
  tM.forEach((m,i)=>{
    const div=document.createElement("div"); div.className="member";
    const img=document.createElement("img"); img.src=m.img||"maroon.jpg"; div.appendChild(img);
    const h=document.createElement("h3"); h.textContent=m.name; div.appendChild(h);
    const p=document.createElement("p"); p.textContent=m.role; div.appendChild(p);
    grid.appendChild(div);

    div.addEventListener("mouseenter",e=>{tooltip.textContent=`${m.email||'No email'}, ${m.phone||'No phone'}`; tooltip.style.opacity=1;});
    div.addEventListener("mousemove",e=>{tooltip.style.left=(e.pageX+15)+"px"; tooltip.style.top=(e.pageY+15)+"px";});
    div.addEventListener("mouseleave",e=>{tooltip.style.opacity=0;});

    if(isAdminLoggedIn && document.getElementById("teamTab").classList.contains("active")){
      const card=document.createElement("div"); card.className="admin-card";
      card.innerHTML=`<strong>${m.name}</strong><br><strong>${m.role}</strong><br>Email: ${m.email||''} <button onclick="editEmail(${i})">Edit</button><br>Phone: ${m.phone||''} <button onclick="editPhone(${i})">Edit</button><br><button onclick="editTeamMember(${i})">Edit Name/Role/Image</button> <button onclick="deleteTeamMember(${i})">Delete</button>`;
      manager.appendChild(card);
    }
  });
}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eldorado High School - News Broadcasting Club</title>
<style>
:root{
  --primary:#6b0f1a;
  --primary-soft:#8f2333;
  --accent:#f2c94c;
  --bg:#f4f1ec;
  --card:#ffffff;
  --text:#2f2f2f;
  --muted:#666;
}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  scroll-behavior:smooth;
  overflow-x:hidden;
  transition: all 0.5s ease;
  text-align:center;
}
body.dark{
  background:#1b1b1b;
  color:#eee;
}

/* ================= HEADER ================= */
.school-header{
  position:fixed; top:0; width:100%;
  background:rgba(107,15,26,.88);
  backdrop-filter:blur(10px);
  color:white; padding:14px 6%;
  display:flex; justify-content:space-between; align-items:center;
  border-bottom:2px solid var(--accent); z-index:1000;
  transition: all 0.5s ease;
}
.header-left{display:flex;align-items:center;gap:14px;}
.header-left img{height:50px;}
.header-text h1{font-size:1.1rem;font-weight:600;}
.header-text span{font-size:.8rem;color:var(--accent);letter-spacing:1px;}
.school-header nav{display:flex;align-items:center;}
.school-header nav a{
  color:white; text-decoration:none; margin-left:22px;
  font-weight:500; font-size:.95rem; transition:.3s; cursor:pointer; position:relative;
}
.school-header nav a:hover, .school-header nav a.active{color:var(--accent);}
.school-header nav a.active::after{
  content:""; position:absolute; bottom:-6px; left:0; width:100%; height:2px; background:var(--accent);
}
#darkModeBtn{
  margin-left:20px; background:var(--accent); color:var(--primary);
  border:none; padding:6px 12px; border-radius:6px; cursor:pointer; font-weight:600;
  transition: all 0.4s ease;
}
#darkModeBtn:hover{background:var(--primary-soft); color:white;}

/* ================= HERO ================= */
.hero{
  min-height:90vh;
  width:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  position:relative;
  overflow:hidden;
  transition: all 0.5s ease;
}
.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.45); 
  z-index:0;
  transition: all 0.5s ease;
}
.hero h1, .hero p, .hero button{
  position:relative; z-index:1;
}
.hero h1{
  font-size:3rem;
  font-weight:700;
  margin-bottom:18px;
  text-shadow:0 3px 8px rgba(0,0,0,0.35);
  transition: all 0.5s ease;
}
.hero p{
  font-size:1.25rem;
  max-width:650px;
  margin-bottom:28px;
  line-height:1.5;
  text-shadow:0 2px 6px rgba(0,0,0,0.35);
  transition: all 0.5s ease;
}
.hero button{
  background:var(--accent); 
  color:var(--primary);
  border:none; 
  padding:16px 32px; 
  border-radius:10px;
  font-weight:600; 
  cursor:pointer; 
  transition: all 0.5s ease; 
  box-shadow:0 8px 20px rgba(0,0,0,0.25);
}
.hero button:hover{
  transform:translateY(-3px); 
  box-shadow:0 12px 28px rgba(0,0,0,0.35);
}
body.dark .hero::before{ background:rgba(0,0,0,0.6); }
body.dark .hero button{ background:var(--primary-soft); color:white; }
body.dark .hero button:hover{ background:var(--accent); color:var(--primary); }

/* Use picture element for responsive hero background */
.hero-picture{
  position:absolute; inset:0; width:100%; height:100%; z-index:-1;
}
.hero-picture img{
  width:100%; height:100%; object-fit:cover;
  object-position:center center; filter:brightness(0.65); transition: all 0.5s ease;
}

/* ================= OTHER SECTIONS ================= */
.broadcasts, .team, .join{
  background:var(--card);
  border-radius:18px;
  box-shadow:0 15px 35px rgba(0,0,0,.05);
  padding:40px 20px;
  width:90%;
  max-width:1000px;
  margin:80px auto;
  display:flex;
  flex-direction:column;
  align-items:center;
  transition: all 0.5s ease;
}
.broadcasts h2, .team h2, .join h2{margin-bottom:30px;font-size:1.8rem;font-weight:600;}
.video-main{width:100%; max-width:720px; margin:0 auto;}
.video-player{width:100%;height:50vh;border-radius:14px;border:none;box-shadow:0 10px 25px rgba(0,0,0,.08);}
#videoTranscript{margin-top:15px; padding:15px; background:#f9f9f9; border-radius:12px; text-align:left; max-height:200px; overflow-y:auto; color:var(--text);}
.video-scroll{margin-top:20px;display:flex;gap:12px;overflow-x:auto;padding-bottom:10px;justify-content:center;}
.video-scroll button{background:var(--primary);color:white;border:none;padding:10px 18px;border-radius:8px;font-size:.9rem;cursor:pointer;transition:.4s;}
.video-scroll button:hover{background:var(--accent);color:var(--primary);}

/* ================= DARK MODE ================= */
body.dark .broadcasts, body.dark .team, body.dark .join{background:#2a2a2a; color:#eee;}
body.dark #videoTranscript{background:#333; color:#eee;}
body.dark .video-scroll button{background:#444; color:#eee;}
body.dark .video-scroll button:hover{background:var(--accent); color:#1b1b1b;}

/* ================= TEAM GRID ================= */
.team-grid{width:90%; margin:0 auto; display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:40px;}
.member{background:var(--card);padding:28px 20px;border-radius:18px;box-shadow:0 10px 25px rgba(0,0,0,.06);transition:.5s;position:relative;cursor:pointer;}
.member:hover{transform:translateY(-6px);box-shadow:0 15px 35px rgba(0,0,0,.1);}
.member img{width:110px;height:110px;border-radius:50%;object-fit:cover;margin-bottom:15px;transition:.5s;}
.member h3{font-size:1.1rem;margin-bottom:4px;}
.member p{color:var(--muted);font-size:.9rem;transition:.5s;}
.member::after{content:attr(data-contact);position:absolute;bottom:-38px;left:50%;transform:translateX(-50%);background:var(--primary);color:var(--accent);padding:6px 12px;border-radius:6px;font-size:.75rem;opacity:0;transition:.3s;}
.member:hover::after{opacity:1;transform:translateX(-50%) translateY(-4px);}
body.dark .member{background:#2a2a2a;}
body.dark .member p{color:#ccc;}
body.dark .member::after{background:var(--accent); color:#1b1b1b;}

/* ================= JOIN FORM ================= */
.join input{padding:12px;margin:8px;width:80%;border-radius:8px;border:1px solid #ddd;font-size:.95rem;}
.join button{background:var(--primary);color:white;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;}
.join button:hover{background:var(--accent);color:var(--primary);}
body.dark .join input{background:#333;color:#eee;border:1px solid #555;}
body.dark .join button{background:#444;color:#eee;}
body.dark .join button:hover{background:var(--accent);color:#1b1b1b;}

/* ================= FOOTER ================= */
footer{background:var(--primary);color:white;text-align:center;padding:18px;font-size:.9rem;transition:.5s;}
body.dark footer{background:#111;}
</style>
</head>
<body>

<header class="school-header">
  <div class="header-left">
    <img src="footer_logo-584425766.png">
    <div class="header-text"><h1>Eldorado High School</h1><span>News Broadcasting Club</span></div>
  </div>
  <nav>
    <a onclick="scrollToSection('hero')">Home</a>
    <a onclick="scrollToSection('broadcasts')">Broadcasts</a>
    <a onclick="scrollToSection('team')">Team</a>
    <a onclick="scrollToSection('join')">Join</a>
    <a onclick="openAdmin()">Admin</a>
    <button id="darkModeBtn" onclick="toggleDarkMode()">Dark Mode</button>
  </nav>
</header>

<section id="hero" class="hero visible">
  <picture class="hero-picture">
    <source srcset="maroon.webp" type="image/webp">
    <img src="maroon.jpg" alt="Eldorado Maroon Background">
  </picture>
  <h1>Welcome to the News Broadcasting Club</h1>
  <p>Delivering school stories. Sharing student voices. Creating future journalists with creativity, courage, and impact.</p>
  <button onclick="scrollToSection('broadcasts')">Watch Latest Broadcast</button>
</section>

<!-- Broadcasts, Team, Join sections remain the same as before -->

<footer>© 2026 Eldorado High School Broadcasting Club</footer>

<script>
// ===== DARK MODE =====
function toggleDarkMode(){document.body.classList.toggle('dark');}

// ===== SCROLL =====
function scrollToSection(id){document.getElementById(id).scrollIntoView({behavior:'smooth'});}
</script>

</body>
</html>

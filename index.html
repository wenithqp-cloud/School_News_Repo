<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eldorado High School - News Broadcasting Club</title>

<!-- VANILLA TILT -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.2/vanilla-tilt.min.js"></script>

<style>
:root{
  --primary:#6b0f1a;
  --primary-soft:#8f2333;
  --accent:#f2c94c;
  --bg:#f4f1ec;
  --card:#ffffff;
  --text:#2f2f2f;
  --muted:#666;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;}
html,body{height:100%;scroll-behavior:smooth;overflow-x:hidden;background:var(--bg);color:var(--text);line-height:1.7;letter-spacing:.3px;}

/* HEADER */
.school-header{
  position:fixed;top:0;width:100%;background:rgba(107,15,26,.88);backdrop-filter:blur(10px);color:white;padding:14px 6%;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--accent);z-index:1000;
}
.header-left{display:flex;align-items:center;gap:14px;}
.header-left img{height:50px;}
.header-text h1{font-size:1.1rem;font-weight:600;}
.header-text span{font-size:.8rem;color:var(--accent);letter-spacing:1px;}
.school-header nav a{color:white;text-decoration:none;margin-left:22px;font-weight:500;font-size:.95rem;transition:.3s;cursor:pointer;position:relative;}
.school-header nav a:hover,.school-header nav a.active{color:var(--accent);}
.school-header nav a.active::after{content:"";position:absolute;bottom:-6px;left:0;width:100%;height:2px;background:var(--accent);}

/* HERO SECTION */
.hero{
  position: relative;
  overflow: hidden;
  text-align: center;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  perspective:1200px;
}
.hero-3d-container{
  position: absolute;
  top:0;left:50%;transform:translateX(-50%);
  width:120%;height:120%;
  pointer-events:none;z-index:0;
}
.hero-3d-container img{
  position:absolute;
  transition:transform 0.1s ease-out;
  border-radius:12px;
}
.hero-text{
  position:relative;
  z-index:1;
  color:white;
}
.hero-text h1{font-size:2.7rem;font-weight:600;margin-bottom:18px;}
.hero-text p{font-size:1.15rem;max-width:600px;margin-bottom:28px;opacity:.95;}
.hero-text button{background:var(--accent);color:var(--primary);border:none;padding:14px 28px;border-radius:8px;font-weight:600;cursor:pointer;transition:.3s;}
.hero-text button:hover{transform:translateY(-3px);box-shadow:0 6px 18px rgba(0,0,0,.15);}

/* TEAM GRID */
.team{text-align:center;padding:60px 20px;}
.team h2{margin-bottom:40px;font-size:1.8rem;}
.team-grid{
  width:90%;
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:40px;
}
.member{
  background:var(--card);
  padding:28px 20px;
  border-radius:18px;
  box-shadow:0 10px 25px rgba(0,0,0,.06);
  transition:.3s;
  position:relative;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.member:hover{transform:translateY(-6px);box-shadow:0 15px 35px rgba(0,0,0,.1);}
.main-logo-container{
  width:110px;
  height:110px;
  position:relative;
  margin-bottom:15px;
}
.main-logo-container img{
  width:110px;
  height:110px;
  border-radius:50%;
  object-fit:cover;
  position:absolute; top:0; left:0; right:0; bottom:0; margin:auto;
}
.member h3{font-size:1.1rem;margin-bottom:4px;text-align:center;}
.member p{color:var(--muted);font-size:.9rem;text-align:center;}
.member::after{content:attr(data-contact);position:absolute;bottom:-38px;left:50%;transform:translateX(-50%);background:var(--primary);color:var(--accent);padding:6px 12px;border-radius:6px;font-size:.75rem;opacity:0;transition:.3s;}
.member:hover::after{opacity:1;transform:translateX(-50%) translateY(-4px);}

/* ADMIN DASHBOARD */
.admin-dashboard{display:none;background:#f4f4f4;width:100%;min-height:100vh;padding:60px 6%;overflow-y:auto;}
.admin-tabs{display:flex;gap:10px;margin-bottom:20px;}
.admin-tab{padding:10px 18px;background:var(--primary);color:white;border-radius:6px;cursor:pointer;transition:.3s;}
.admin-tab.active{background:var(--accent);color:var(--primary);}
.admin-card{background:white;padding:15px;margin-bottom:10px;border-left:4px solid var(--primary-soft);box-shadow:0 2px 6px rgba(0,0,0,.08);}
.tab-content{display:none;}
.tab-content.active{display:block;}
</style>
</head>
<body>

<header class="school-header">
  <div class="header-left">
    <img src="footer_logo-584425766.png">
    <div class="header-text"><h1>Eldorado High School</h1><span>News Broadcasting Club</span></div>
  </div>
  <nav>
    <a onclick="scrollToSection('hero')">Home</a>
    <a onclick="scrollToSection('team')">Team</a>
    <a onclick="openAdmin()">Admin</a>
  </nav>
</header>

<section id="hero" class="hero">
  <div class="hero-3d-container">
    <!-- smaller layers for depth -->
    <img src="maroon.jpg" data-depth="0.02" style="width:80%; height:auto; top:10%; left:50%; transform:translateX(-50%);">
    <img src="maroon.jpg" data-depth="0.05" style="width:75%; height:auto; top:15%; left:50%; transform:translateX(-50%);">
    <img src="maroon.jpg" data-depth="0.1" style="width:70%; height:auto; top:20%; left:50%; transform:translateX(-50%);">
  </div>
  <div class="hero-text">
    <h1>Welcome to the News Broadcasting Club</h1>
    <p>Delivering school stories. Sharing student voices. Creating future journalists.</p>
    <button onclick="scrollToSection('team')">Meet the Team</button>
  </div>
</section>

<section id="team" class="team">
  <h2>Meet the Team</h2>
  <div class="team-grid" id="teamGrid"></div>
</section>

<div class="admin-dashboard" id="adminDashboard">
  <h1>Admin Panel</h1>
  <div class="admin-tabs">
    <div class="admin-tab active" onclick="switchTab('teamTab')">Team Members</div>
  </div>
  <div id="teamTab" class="tab-content active">
    <button onclick="addTeamMember()">Add Member</button>
    <div id="teamManager"></div>
  </div>
</div>

<script>
// SCROLL
function scrollToSection(id){document.getElementById(id).scrollIntoView({behavior:'smooth'});}
function switchTab(tab){
  document.querySelectorAll(".tab-content").forEach(t=>t.classList.remove("active"));
  document.getElementById(tab).classList.add("active");
  document.querySelectorAll(".admin-tab").forEach(t=>t.classList.remove("active"));
  document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add("active");
  if(tab==='teamTab') loadTeamMembers();
}

// HERO 3D PARALLAX
const hero = document.querySelector('.hero-3d-container');
const layers = hero.querySelectorAll('img');
document.addEventListener('mousemove', e=>{
  const x = (window.innerWidth/2 - e.clientX)/50;
  const y = (window.innerHeight/2 - e.clientY)/50;
  layers.forEach(l=>{
    const depth = parseFloat(l.dataset.depth);
    l.style.transform = `translateX(${x*depth*100}px) translateY(${y*depth*100}px) scale(1.05)`;
  });
});

// TEAM MEMBERS WITH 3D TILT
function loadTeamMembers(){
  const tM=JSON.parse(localStorage.getItem("teamMembers")||"[]");
  const grid=document.getElementById("teamGrid"); grid.innerHTML="";
  const manager=document.getElementById("teamManager"); if(manager) manager.innerHTML="";
  tM.forEach((m,i)=>{
    const div=document.createElement("div"); div.className="member";
    div.setAttribute("data-contact",`${m.email||'No email'}, ${m.phone||'No phone'}`);
    const logoContainer=document.createElement("div"); logoContainer.className="main-logo-container";
    const img=document.createElement("img"); img.src=m.img||"maroon.jpg"; img.style.transform="translateZ(20px)";
    logoContainer.appendChild(img); div.appendChild(logoContainer);
    const h=document.createElement("h3"); h.textContent=m.name||"No Name"; div.appendChild(h);
    const p=document.createElement("p"); p.textContent=m.role||"No Role"; div.appendChild(p);
    grid.appendChild(div);
    if(manager && document.getElementById("teamTab").classList.contains("active")){
      const card=document.createElement("div"); card.className="admin-card";
      card.innerHTML=`<strong>${m.name}</strong><br>${m.role}<br>Email: ${m.email||''} <button onclick="editEmail(${i})">Edit</button><br>
      Phone: ${m.phone||''} <button onclick="editPhone(${i})">Edit</button><br>
      <button onclick="editTeamMember(${i})">Edit Name/Role/Image</button> <button onclick="deleteTeamMember(${i})">Delete</button>`;
      manager.appendChild(card);
    }
  });

  if(typeof VanillaTilt!=="undefined"){
    document.querySelectorAll(".main-logo-container").forEach(el=>{if(el.vanillaTilt) el.vanillaTilt.destroy();});
    VanillaTilt.init(document.querySelectorAll(".main-logo-container"),{max:15,speed:400,glare:true,"max-glare":0.2});
  }
}

// ADMIN FUNCTIONS
function addTeamMember(){const n=prompt("Name:"),r=prompt("Role:"),e=prompt("Email:"),p=prompt("Phone:"),img=prompt("Image URL:");if(!n||!r)return;const tM=JSON.parse(localStorage.getItem("teamMembers")||"[]");tM.push({name:n,role:r,email:e,phone:p,img});localStorage.setItem("teamMembers",JSON.stringify(tM));loadTeamMembers();}
function editTeamMember(i){const tM=JSON.parse(localStorage.getItem("teamMembers")||"[]");const n=prompt("Name:",tM[i].name),r=prompt("Role:",tM[i].role),img=prompt("Image URL:",tM[i].img);if(!n||!r)return;tM[i].name=n;tM[i].role=r;tM[i].img=img;localStorage.setItem("teamMembers",JSON.stringify(tM));loadTeamMembers();}
function editEmail(i){const tM=JSON.parse(localStorage.getItem("teamMembers")||"[]");const e=prompt("Email:",tM[i].email);if(e!==null){tM[i].email=e;localStorage.setItem("teamMembers",JSON.stringify(tM));loadTeamMembers();}}
function editPhone(i){const tM=JSON.parse(localStorage.getItem("teamMembers")||"[]");const p=prompt("Phone:",tM[i].phone);if(p!==null){tM[i].phone=p;localStorage.setItem("teamMembers",JSON.stringify(tM));loadTeamMembers();}}
function deleteTeamMember(i){const tM=JSON.parse(localStorage.getItem("teamMembers")||"[]");tM.splice(i,1);localStorage.setItem("teamMembers",JSON.stringify(tM));loadTeamMembers();}

// INITIAL LOAD
window.onload=()=>{loadTeamMembers();};
</script>

</body>
</html>

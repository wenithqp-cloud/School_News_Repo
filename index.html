<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eldorado High School - News Broadcasting Club</title>

<style>

/* ================= GLOBAL ================= */
*{margin:0;padding:0;box-sizing:border-box;font-family:"Helvetica Neue",Arial,sans-serif;}
html,body{height:100%;scroll-behavior:smooth;overflow-x:hidden;}
body{background:#f8f5f1;color:#333;line-height:1.6;position:relative;}
section{width:100%;min-height:100vh;display:flex;justify-content:center;align-items:center;flex-direction:column;padding:6%;scroll-snap-align:start;opacity:0;transform:translateY(40px);transition:all .8s ease;}
section.visible{opacity:1;transform:translateY(0);}
html{scroll-snap-type:y mandatory;}

/* ================= SPINNING BACKGROUND ================= */
body::before{
content:"";position:fixed;top:50%;left:50%;
width:700px;height:700px;
background:url("footer_logo-584425766.png") no-repeat center;
background-size:contain;opacity:0.08;
transform:translate(-50%,-50%) rotate(var(--rotation,0deg));
z-index:-1;animation:spin 12s linear infinite;}
@keyframes spin{from{transform:translate(-50%,-50%) rotate(0deg);}to{transform:translate(-50%,-50%) rotate(360deg);}}

/* ================= HEADER ================= */
.school-header{
position:fixed;top:0;width:100%;
background:rgba(122,0,25,.92);
backdrop-filter:blur(8px);
color:white;padding:15px 5%;
display:flex;justify-content:space-between;align-items:center;
border-bottom:4px solid #ffd700;
z-index:1000;transition:.3s;}
.header-left{display:flex;align-items:center;gap:15px;}
.header-left img{height:55px;}
.header-text h1{font-size:1.2rem;}
.header-text span{font-size:.8rem;color:#ffd700;letter-spacing:1px;}
.school-header nav a{
color:white;text-decoration:none;margin-left:18px;
font-weight:600;cursor:pointer;position:relative;transition:.3s;}
.school-header nav a:hover,
.school-header nav a.active{color:#ffd700;}
.school-header nav a.active::after{
content:"";position:absolute;bottom:-5px;left:0;width:100%;height:2px;background:#ffd700;}

/* ================= HERO ================= */
.hero{background:#7a0019;color:white;text-align:center;}
.hero h1{font-size:3rem;margin-bottom:15px;animation:fadeUp 1s ease forwards;}
.hero p{font-size:1.3rem;margin-bottom:20px;animation:fadeUp 1.2s ease forwards;}
.hero button{
background:#ffd700;color:#7a0019;border:none;
padding:14px 28px;border-radius:6px;
font-weight:bold;cursor:pointer;transition:.3s;}
.hero button:hover{background:white;transform:scale(1.05);}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

/* ================= BROADCASTS ================= */
.broadcasts{background:#fff;border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,.08);}
.video-main{width:80%;max-width:900px;margin:10px auto;}
.video-player{width:100%;height:50vh;border-radius:10px;border:3px solid #7a0019;}
.video-scroll{display:flex;justify-content:center;overflow-x:auto;gap:10px;padding:15px 0;}
.video-scroll button{
background:#7a0019;color:white;border:none;
padding:10px 18px;border-radius:6px;
cursor:pointer;transition:.3s;}
.video-scroll button:hover{background:#ffd700;color:#7a0019;transform:scale(1.05);}

/* ================= TEAM ================= */
.team{background:#fafafa;}
.team-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:40px;width:80%;}

.member{
background:white;padding:20px;border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
display:flex;flex-direction:column;align-items:center;
position:relative;cursor:pointer;
transition:.3s;}
.member:hover{transform:translateY(-6px);box-shadow:0 12px 30px rgba(0,0,0,.15);}
.member img{
width:120px;height:120px;border-radius:50%;
object-fit:cover;margin-bottom:12px;}
.member h3{margin:5px 0;}
.member p{font-size:.9rem;color:#666;}

/* Tooltip */
.member::after{
content:attr(data-contact);
position:absolute;bottom:-38px;left:50%;
transform:translateX(-50%);
background:#7a0019;color:#ffd700;
padding:6px 12px;border-radius:4px;
font-size:.75rem;white-space:nowrap;
opacity:0;transition:.3s;}
.member:hover::after{opacity:1;transform:translateX(-50%) translateY(-5px);}

/* ================= JOIN ================= */
.join{background:#ececec;text-align:center;}
.join input{
padding:10px;margin:6px;width:250px;
border-radius:6px;border:1px solid #ccc;}
.join button{
background:#7a0019;color:white;border:none;
padding:10px 20px;border-radius:6px;
cursor:pointer;transition:.3s;}
.join button:hover{background:#ffd700;color:#7a0019;}

/* ================= FOOTER ================= */
footer{background:#7a0019;color:white;text-align:center;padding:15px;}

</style>
</head>

<body>

<header class="school-header">
<div class="header-left">
<img src="footer_logo-584425766.png">
<div class="header-text">
<h1>Eldorado High School</h1>
<span>News Broadcasting Club</span>
</div>
</div>
<nav>
<a onclick="scrollToSection('hero')">Home</a>
<a onclick="scrollToSection('broadcasts')">Broadcasts</a>
<a onclick="scrollToSection('team')">Team</a>
<a onclick="scrollToSection('join')">Join</a>
</nav>
</header>

<section id="hero" class="hero">
<h1>Welcome to the News Broadcasting Club</h1>
<p>Delivering school stories. Sharing student voices. Creating future journalists.</p>
<button onclick="scrollToSection('broadcasts')">Watch Latest Broadcast</button>
</section>

<section id="broadcasts" class="broadcasts">
<h2>Latest Broadcasts</h2>
<div class="video-main">
<iframe id="mainVideo" class="video-player" src="" allowfullscreen></iframe>
</div>
<div class="video-scroll" id="videoScroll"></div>
</section>

<section id="team" class="team">
<h2>Meet the Team</h2>
<div class="team-grid" id="teamGrid"></div>
</section>

<section id="join" class="join">
<h2>Join the Club</h2>
<form onsubmit="submitForm(event)">
<input type="text" id="name" placeholder="Your Name" required>
<input type="email" id="email" placeholder="Your Email" required><br>
<button type="submit">Submit</button>
</form>
</section>

<footer>© 2026 School News Broadcasting Club</footer>

<script>

/* Background rotation */
window.addEventListener("scroll",()=>{
document.body.style.setProperty("--rotation",window.scrollY*.12+"deg");
});

/* Smooth Scroll */
function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

/* Scroll Reveal + Active Nav */
const sections=document.querySelectorAll("section");
const navLinks=document.querySelectorAll(".school-header nav a");

window.addEventListener("scroll",()=>{
let current="";
sections.forEach(section=>{
const sectionTop=section.offsetTop-150;
if(pageYOffset>=sectionTop){
current=section.getAttribute("id");
section.classList.add("visible");
}
});
navLinks.forEach(link=>{
link.classList.remove("active");
if(link.getAttribute("onclick").includes(current)){
link.classList.add("active");
}
});
});

/* Simple demo team loader */
function loadTeam(){
const team=[
{name:"Alex Martinez",role:"Lead Anchor",email:"alex@school.edu",phone:"555-1111"},
{name:"Jordan Lee",role:"Editor",email:"jordan@school.edu",phone:"555-2222"},
{name:"Taylor Smith",role:"Reporter",email:"taylor@school.edu",phone:"555-3333"}
];
const grid=document.getElementById("teamGrid");
team.forEach(m=>{
const div=document.createElement("div");
div.className="member";
div.setAttribute("data-contact",`${m.email} | ${m.phone}`);
div.innerHTML=`
<img src="maroon.jpg">
<h3>${m.name}</h3>
<p>${m.role}</p>`;
grid.appendChild(div);
});
}

function submitForm(e){
e.preventDefault();
alert("Thanks for joining!");
e.target.reset();
}

window.onload=()=>{loadTeam();};

</script>

</body>
</html>

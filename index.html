<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eldorado High School - News Broadcasting Club</title>

<style>
/* ================= GLOBAL ================= */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Helvetica Neue",Arial,sans-serif;
}

html {
  scroll-behavior:smooth;
}

body {
  background-color:#f8f5f1;
  color:#333;
  line-height:1.6;
  overflow-x:hidden;
  padding-top:100px; /* prevents header overlap */
}

/* ================= BACKGROUND ================= */
body::before {
  content:"";
  position:fixed;
  top:50%;
  left:50%;
  width:700px;
  height:700px;
  background:url("footer_logo-584425766.png") no-repeat center;
  background-size:contain;
  opacity:0.12;
  transform:translate(-50%, -50%);
  z-index:-1;
  pointer-events:none;
  animation:spin 20s linear infinite;
}

@keyframes spin {
  from { transform:translate(-50%, -50%) rotate(0deg); }
  to { transform:translate(-50%, -50%) rotate(360deg); }
}

/* ================= HEADER ================= */
.school-header {
  position:fixed;
  top:0;
  width:100%;
  background:#7a0019;
  color:white;
  padding:15px 5%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:5px solid #ffd700;
  z-index:1000;
}

.header-left {
  display:flex;
  align-items:center;
  gap:15px;
}

.header-left img {
  height:60px;
}

.header-text h1 {
  font-size:1.3rem;
}

.header-text span {
  font-size:0.85rem;
  color:#ffd700;
  letter-spacing:1px;
}

.school-header nav {
  display:flex;
  align-items:center;
}

.school-header nav a {
  color:white;
  text-decoration:none;
  margin-left:20px;
  font-weight:600;
  transition:0.3s;
  cursor:pointer;
}

.school-header nav a:hover {
  color:#ffd700;
}

/* ================= HAMBURGER ================= */
.hamburger {
  display:none;
  flex-direction: column;
  cursor:pointer;
  gap:5px;
  z-index:1100;
}

.hamburger div {
  width:25px;
  height:3px;
  background:white;
  transition: all 0.3s ease;
}

.hamburger.open div:nth-child(1) {
  transform:rotate(45deg) translate(5px,5px);
}
.hamburger.open div:nth-child(2) {
  opacity:0;
}
.hamburger.open div:nth-child(3) {
  transform:rotate(-45deg) translate(5px,-5px);
}

/* ================= SECTIONS ================= */
section {
  width:100%;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding:5%;
  scroll-margin-top:120px; /* prevents header covering section */
}

/* ================= HERO ================= */
.hero {
  background:#7a0019;
  color:white;
  text-align:center;
}

.hero h1 {
  font-size:3rem;
  margin-bottom:15px;
}

.hero p {
  font-size:1.4rem;
  margin-bottom:20px;
}

.hero button {
  background:#ffd700;
  color:#7a0019;
  border:none;
  padding:12px 25px;
  border-radius:4px;
  cursor:pointer;
  transition:0.3s;
}

.hero button:hover {
  background:white;
  transform:scale(1.05);
}

/* ================= MOBILE ================= */
@media (max-width: 768px) {

  body {
    padding-top:120px;
  }

  .school-header {
    flex-direction:column;
    align-items:flex-start;
    padding:10px 5%;
  }

  .header-left {
    flex-direction:column;
    align-items:flex-start;
    gap:5px;
  }

  .header-left img {
    height:50px;
  }

  .header-text h1 {
    font-size:1.1rem;
  }

  .header-text span {
    font-size:0.75rem;
  }

  .school-header nav {
    display:none;
    flex-direction:column;
    width:100%;
    margin-top:10px;
  }

  .school-header nav a {
    margin:10px 0;
  }

  .school-header nav.active {
    display:flex;
  }

  .hamburger {
    display:flex;
    position:absolute;
    right:5%;
    top:25px;
  }
}
</style>
</head>

<body>

<header class="school-header">
  <div class="header-left">
    <img src="footer_logo-584425766.png" alt="Logo">
    <div class="header-text">
      <h1>Eldorado High School</h1>
      <span>News Broadcasting Club</span>
    </div>
  </div>

  <div class="hamburger" onclick="toggleMenu(this)">
    <div></div>
    <div></div>
    <div></div>
  </div>

  <nav id="navLinks">
    <a onclick="scrollToSection('hero')">Home</a>
    <a onclick="scrollToSection('broadcasts')">Broadcasts</a>
    <a onclick="scrollToSection('team')">Team</a>
    <a onclick="scrollToSection('join')">Join</a>
    <a onclick="scrollToSection('aboutUs')">About Us</a>
  </nav>
</header>

<section id="hero" class="hero">
  <h1>Welcome to the Eldorado News Broadcasting Club</h1>
  <p>Delivering school stories. Sharing student voices. Creating future journalists.</p>
  <button onclick="scrollToSection('broadcasts')">Watch Latest Broadcast</button>
</section>
z
<!-- Add your other sections here -->

<script>
function scrollToSection(id){
  const section = document.getElementById(id);
  if(section){
    section.scrollIntoView({behavior:'smooth'});
    closeMenu();
  }
}

function toggleMenu(el){
  el.classList.toggle('open');
  document.getElementById('navLinks').classList.toggle('active');
}

function closeMenu(){
  document.querySelector('.hamburger').classList.remove('open');
  document.getElementById('navLinks').classList.remove('active');
}
</script>

</body>
</html>

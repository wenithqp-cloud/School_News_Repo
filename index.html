<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eldorado High School - News Broadcasting Club</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Helvetica Neue",Arial,sans-serif;
}

html{scroll-behavior:smooth;}

body{
  background:#f8f5f1;
  color:#333;
  line-height:1.6;
  overflow-x:hidden;
  padding-top:110px;
}

/* BACKGROUND */
body::before{
  content:"";
  position:fixed;
  top:50%;
  left:50%;
  width:700px;
  height:700px;
  background:url("footer_logo-584425766.png") no-repeat center;
  background-size:contain;
  opacity:0.12;
  transform:translate(-50%, -50%);
  z-index:-1;
  pointer-events:none;
  animation:spin 20s linear infinite;
}
@keyframes spin{
  from{transform:translate(-50%, -50%) rotate(0deg);}
  to{transform:translate(-50%, -50%) rotate(360deg);}
}

/* HEADER (UPGRADED) */
.school-header{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(122,0,25,0.95);
  backdrop-filter:blur(8px);
  color:white;
  padding:15px 5%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:5px solid #ffd700;
  z-index:1000;
  transition:all 0.3s ease;
}

.header-left{
  display:flex;
  align-items:center;
  gap:15px;
}

.header-left img{height:60px;}

.header-text h1{font-size:1.3rem;}

.header-text span{
  font-size:0.85rem;
  color:#ffd700;
  letter-spacing:1px;
}

.school-header nav a{
  color:white;
  text-decoration:none;
  margin-left:15px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.school-header nav a:hover{
  color:#ffd700;
}

.school-header nav a.active{
  color:#ffd700;
  border-bottom:2px solid #ffd700;
}

/* SECTIONS (SCROLL REVEAL) */
section{
  width:100%;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding:5%;
  scroll-margin-top:120px;

  opacity:0;
  transform:translateY(40px);
  transition:all 0.8s ease;
}

section.visible{
  opacity:1;
  transform:translateY(0);
}

/* HERO */
.hero{
  background:#7a0019;
  color:white;
  text-align:center;
}

.hero h1{
  font-size:3rem;
  margin-bottom:15px;
  animation:fadeUp 1s ease forwards;
}

.hero p{
  font-size:1.4rem;
  margin-bottom:20px;
  animation:fadeUp 1.2s ease forwards;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

.hero button{
  background:#ffd700;
  color:#7a0019;
  border:none;
  padding:12px 25px;
  border-radius:4px;
  cursor:pointer;
  transition:0.3s;
}

.hero button:hover{
  background:white;
  transform:scale(1.05);
}

/* BROADCASTS */
.broadcasts{
  background:#fff;
  border:4px solid #7a0019;
  border-top:8px solid #ffd700;
  border-radius:8px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  padding-bottom:40px;
}

.video-main{
  width:80%;
  max-width:900px;
  margin:10px auto;
}

.video-player{
  width:100%;
  height:50vh;
  border-radius:6px;
  border:3px solid #7a0019;
}

.video-scroll{
  display:flex;
  justify-content:center;
  overflow-x:auto;
  gap:10px;
  padding:10px 0;
}

.video-scroll button{
  background:#7a0019;
  color:white;
  border:none;
  padding:10px 18px;
  border-radius:4px;
  cursor:pointer;
}

.video-scroll button:hover{
  background:#ffd700;
  color:#7a0019;
}

/* TEAM */
.team{background:#fafafa;width:100%;}
.team-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:40px;
  width:80%;
}

.member{
  background:#fff;
  padding:15px;
  border-left:4px solid #7a0019;
  border-radius:6px;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  align-items:center;
  transition:0.3s;
}

.member:hover{
  transform:scale(1.05);
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.member img{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:10px;
}

/* TOOLTIP */
.tooltip{
  position:fixed;
  background:#7a0019;
  color:#ffd700;
  padding:5px 10px;
  border-radius:4px;
  font-size:0.75rem;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.2s;
  z-index:9999;
}

/* JOIN */
.join{
  background:#eaeaea;
  padding:40px 5%;
  width:100%;
}

.join input{
  padding:10px;
  margin:5px;
  width:250px;
  border-radius:4px;
  border:1px solid #ccc;
}

.join button{
  background:#7a0019;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:4px;
  cursor:pointer;
}

.join button:hover{
  background:#ffd700;
  color:#7a0019;
}

/* ABOUT */
#aboutUs{
  background:#fff;
  padding:40px 5%;
  border-top:4px solid #7a0019;
  text-align:center;
}

footer{
  background:#7a0019;
  color:white;
  text-align:center;
  padding:15px;
}
</style>
</head>

<body>

<header class="school-header">
  <div class="header-left">
    <img src="footer_logo-584425766.png">
    <div class="header-text">
      <h1>Eldorado High School</h1>
      <span>News Broadcasting Club</span>
    </div>
  </div>
  <nav>
    <a onclick="scrollToSection('hero')">Home</a>
    <a onclick="scrollToSection('broadcasts')">Broadcasts</a>
    <a onclick="scrollToSection('team')">Team</a>
    <a onclick="scrollToSection('join')">Join</a>
    <a onclick="scrollToSection('aboutUs')">About Us</a>
  </nav>
</header>

<script>
function scrollToSection(id){
  const section=document.getElementById(id);
  if(section){
    section.scrollIntoView({behavior:'smooth'});
  }
}

/* SCROLL REVEAL + ACTIVE NAV */
const sections=document.querySelectorAll("section");
const navLinks=document.querySelectorAll(".school-header nav a");

window.addEventListener("scroll",()=>{
  let current="";

  sections.forEach(section=>{
    const sectionTop=section.offsetTop - 150;
    if(pageYOffset>=sectionTop){
      current=section.getAttribute("id");
      section.classList.add("visible");
    }
  });

  navLinks.forEach(link=>{
    link.classList.remove("active");
    if(link.getAttribute("onclick")?.includes(current)){
      link.classList.add("active");
    }
  });
});

/* VIDEO SYSTEM (UNCHANGED) */
function getYouTubeEmbed(u){
  const r=/(?:\?v=|\/embed\/|\.be\/)([a-zA-Z0-9_-]{11})/;
  const m=u.match(r);
  return m&&m[1]?`https://www.youtube.com/embed/${m[1]}`:u;
}

function loadVideos(){
  let videos=JSON.parse(localStorage.getItem("videos"))||[];
  const scroll=document.getElementById("videoScroll");
  const mainVideo=document.getElementById("mainVideo");
  if(!scroll||!mainVideo) return;

  scroll.innerHTML="";
  videos.slice().reverse().forEach((video)=>{
    const btn=document.createElement("button");
    btn.textContent=video.title;
    btn.onclick=()=>{
      mainVideo.src=getYouTubeEmbed(video.link);
      document.getElementById("videoTranscript").textContent=video.transcript||"";
    };
    scroll.appendChild(btn);
  });

  if(videos.length){
    mainVideo.src=getYouTubeEmbed(videos[videos.length-1].link);
  }
}

/* TEAM SYSTEM (UNCHANGED) */
function loadTeamMembers(){
  const members=JSON.parse(localStorage.getItem("teamMembers"))||[];
  const grid=document.getElementById("teamGrid");
  const tooltip=document.getElementById("tooltip");
  if(!grid) return;

  grid.innerHTML="";
  members.forEach((m)=>{
    const div=document.createElement("div");
    div.className="member";
    div.innerHTML=`
      <img src="${m.img||'maroon.jpg'}">
      <h3>${m.name}</h3>
      <p>${m.role}</p>
    `;

    div.addEventListener("mouseenter",()=>{
      tooltip.textContent=\`\${m.email||'No email'}, \${m.phone||'No phone'}\`;
      tooltip.style.opacity=1;
    });
    div.addEventListener("mousemove",(e)=>{
      tooltip.style.left=(e.pageX+15)+"px";
      tooltip.style.top=(e.pageY+15)+"px";
    });
    div.addEventListener("mouseleave",()=>{
      tooltip.style.opacity=0;
    });

    grid.appendChild(div);
  });
}

window.onload=()=>{
  loadVideos();
  loadTeamMembers();
  sections.forEach(sec=>sec.classList.add("visible"));
};
</script>

</body>
</html>

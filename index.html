<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eldorado High School - News Broadcasting Club</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:"Helvetica Neue",Arial,sans-serif;
}

html{scroll-behavior:smooth;}

body{
  background:#f8f5f1;
  color:#333;
  line-height:1.6;
  overflow-x:hidden;
  padding-top:110px;
}

/* BACKGROUND */
body::before{
  content:"";
  position:fixed;
  top:50%;
  left:50%;
  width:700px;
  height:700px;
  background:url("footer_logo-584425766.png") no-repeat center;
  background-size:contain;
  opacity:0.12;
  transform:translate(-50%, -50%);
  z-index:-1;
  pointer-events:none;
  animation:spin 20s linear infinite;
}
@keyframes spin{
  from{transform:translate(-50%, -50%) rotate(0deg);}
  to{transform:translate(-50%, -50%) rotate(360deg);}
}

/* HEADER */
.school-header{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(122,0,25,0.95);
  backdrop-filter:blur(8px);
  color:white;
  padding:15px 5%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:5px solid #ffd700;
  z-index:1000;
  transition:all 0.3s ease;
}

.header-left{
  display:flex;
  align-items:center;
  gap:15px;
}

.header-left img{
  height:60px;
}

.header-text h1{font-size:1.3rem;}

.header-text span{
  font-size:0.85rem;
  color:#ffd700;
  letter-spacing:1px;
}

.school-header nav a{
  color:white;
  text-decoration:none;
  margin-left:15px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.school-header nav a:hover{
  color:#ffd700;
}

.school-header nav a.active{
  color:#ffd700;
  border-bottom:2px solid #ffd700;
}

/* SECTIONS */
section{
  width:100%;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  padding:5%;
  scroll-margin-top:120px;

  opacity:0;
  transform:translateY(40px);
  transition:all 0.8s ease;
}

section.visible{
  opacity:1;
  transform:translateY(0);
}

/* HERO */
.hero{
  background:#7a0019;
  color:white;
  text-align:center;
}

.hero h1{
  font-size:3rem;
  margin-bottom:15px;
}

.hero p{
  font-size:1.4rem;
  margin-bottom:20px;
}

.hero button{
  background:#ffd700;
  color:#7a0019;
  border:none;
  padding:12px 25px;
  border-radius:4px;
  cursor:pointer;
  transition:0.3s;
}

.hero button:hover{
  background:white;
  transform:scale(1.05);
}

/* Other styles unchanged... */
</style>
</head>

<body>

<header class="school-header">
  <div class="header-left">
    <img src="footer_logo-584425766.png" alt="Eldorado High School Logo">
    <div class="header-text">
      <h1>Eldorado High School</h1>
      <span>News Broadcasting Club</span>
    </div>
  </div>
  <nav>
    <a onclick="scrollToSection('hero')">Home</a>
    <a onclick="scrollToSection('broadcasts')">Broadcasts</a>
    <a onclick="scrollToSection('team')">Team</a>
    <a onclick="scrollToSection('join')">Join</a>
    <a onclick="scrollToSection('aboutUs')">About Us</a>
  </nav>
</header>

<script>
document.addEventListener("DOMContentLoaded", () => {

  function scrollToSection(id){
    const section = document.getElementById(id);
    if(section){
      section.scrollIntoView({behavior:'smooth'});
    }
  }
  window.scrollToSection = scrollToSection;

  const sections = document.querySelectorAll("section");
  const navLinks = document.querySelectorAll(".school-header nav a");

  window.addEventListener("scroll", () => {
    let current = "";

    sections.forEach(section => {
      const sectionTop = section.offsetTop - 150;
      if(window.scrollY >= sectionTop){
        current = section.getAttribute("id");
        section.classList.add("visible");
      }
    });

    navLinks.forEach(link => {
      link.classList.remove("active");
      if(link.getAttribute("onclick")?.includes(current)){
        link.classList.add("active");
      }
    });
  });

  /* VIDEO SYSTEM */
  function getYouTubeEmbed(u){
    const r=/(?:\?v=|\/embed\/|\.be\/)([a-zA-Z0-9_-]{11})/;
    const m=u.match(r);
    return m&&m[1]?`https://www.youtube.com/embed/${m[1]}`:u;
  }

  function loadVideos(){
    let videos=JSON.parse(localStorage.getItem("videos"))||[];
    const scroll=document.getElementById("videoScroll");
    const mainVideo=document.getElementById("mainVideo");
    if(!scroll||!mainVideo) return;

    scroll.innerHTML="";
    videos.slice().reverse().forEach((video)=>{
      const btn=document.createElement("button");
      btn.textContent=video.title;
      btn.onclick=()=>{
        mainVideo.src=getYouTubeEmbed(video.link);
      };
      scroll.appendChild(btn);
    });

    if(videos.length){
      mainVideo.src=getYouTubeEmbed(videos[videos.length-1].link);
    }
  }

  function loadTeamMembers(){
    const members=JSON.parse(localStorage.getItem("teamMembers"))||[];
    const grid=document.getElementById("teamGrid");
    if(!grid) return;

    grid.innerHTML="";
    members.forEach((m)=>{
      const div=document.createElement("div");
      div.className="member";
      div.innerHTML=`
        <img src="${m.img||'maroon.jpg'}">
        <h3>${m.name}</h3>
        <p>${m.role}</p>
      `;
      grid.appendChild(div);
    });
  }

  loadVideos();
  loadTeamMembers();

});
</script>

</body>
</html>

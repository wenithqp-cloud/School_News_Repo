<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eldorado High School - News Broadcasting Club</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.2/vanilla-tilt.min.js"></script>
<style>
:root{
  --primary:#6b0f1a; --primary-soft:#8f2333; --accent:#f2c94c;
  --bg:#f4f1ec; --card:#ffffff; --text:#2f2f2f; --muted:#666;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;}
html,body{height:100%;scroll-behavior:smooth;overflow-x:hidden;background:var(--bg);color:var(--text);line-height:1.7;letter-spacing:.3px;}
.school-header{
  position:fixed; top:0; width:100%;
  background:rgba(107,15,26,.88); backdrop-filter:blur(10px);
  color:white; padding:14px 6%;
  display:flex; justify-content:space-between; align-items:center;
  border-bottom:2px solid var(--accent); z-index:1000;
}
.header-left{display:flex;align-items:center;gap:14px;}
.header-left img{height:50px;}
.header-text h1{font-size:1.1rem;font-weight:600;}
.header-text span{font-size:.8rem;color:var(--accent);letter-spacing:1px;}
.school-header nav a{
  color:white;text-decoration:none;margin-left:22px;
  font-weight:500;font-size:.95rem;transition:.3s;cursor:pointer;position:relative;
}
.school-header nav a:hover, .school-header nav a.active{color:var(--accent);}
.school-header nav a.active::after{
  content:"";position:absolute;bottom:-6px;left:0;width:100%;height:2px;background:var(--accent);
}
section{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:8% 6%;opacity:0;transform:translateY(40px);transition:all .8s ease;}
section.visible{opacity:1;transform:translateY(0);}
.hero{position:relative;text-align:center;background:#6b0f1a;color:white;perspective:1200px;}
.hero h1{font-size:2.7rem;font-weight:600;margin-bottom:18px;}
.hero p{font-size:1.15rem;max-width:600px;margin-bottom:28px;opacity:.95;}
.hero button{background:var(--accent);color:var(--primary);border:none;padding:14px 28px;border-radius:8px;font-weight:600;cursor:pointer;transition:.3s;margin:5px;}
.hero button:hover{transform:translateY(-3px);box-shadow:0 6px 18px rgba(0,0,0,.15);}
.hero-3d-container{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:600px;height:600px;
  pointer-events:none;transform-style: preserve-3d;
}
.hero-3d-container img{
  position:absolute; left:0; right:0; top:0; bottom:0; margin:auto;
  pointer-events:none;
  transition: transform 0.2s ease-out, opacity 0.5s ease;
}
.broadcasts{
  background:var(--card);border-radius:18px;box-shadow:0 15px 35px rgba(0,0,0,.05);
  padding:40px 20px;width:90%;max-width:1000px;margin:40px auto;text-align:center;
  display:flex;flex-direction:column;align-items:center;
}
.broadcasts h2{margin-bottom:30px;font-size:1.8rem;font-weight:600;}
.video-main{width:100%; max-width:720px; margin:0 auto;}
.video-player{width:100%;height:50vh;border-radius:14px;border:none;box-shadow:0 10px 25px rgba(0,0,0,.08);}
#videoTranscript{margin-top:15px;padding:15px;background:#f9f9f9;border-radius:12px;text-align:left;max-height:200px;overflow-y:auto;color:var(--text);}
.video-scroll{margin-top:20px;display:flex;gap:12px;overflow-x:auto;padding-bottom:10px;justify-content:center;}
.video-scroll button{background:var(--primary);color:white;border:none;padding:10px 18px;border-radius:8px;font-size:.9rem;cursor:pointer;transition:.3s;}
.video-scroll button:hover{background:var(--accent);color:var(--primary);}
.team{text-align:center;}
.team h2{margin-bottom:40px;font-size:1.8rem;}
.team-grid{width:90%;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:40px;}
.member{background:var(--card);padding:28px 20px;border-radius:18px;box-shadow:0 10px 25px rgba(0,0,0,.06);transition:.3s;position:relative;cursor:pointer;display:flex;flex-direction:column;align-items:center;}
.member:hover{transform:translateY(-6px);box-shadow:0 15px 35px rgba(0,0,0,.1);}
.member img{width:110px;height:110px;border-radius:50%;object-fit:cover;margin-bottom:15px;}
.member h3{font-size:1.1rem;margin-bottom:4px;}
.member p{color:var(--muted);font-size:.9rem;}
.member::after{content:attr(data-contact);position:absolute;bottom:-38px;left:50%;transform:translateX(-50%);background:var(--primary);color:var(--accent);padding:6px 12px;border-radius:6px;font-size:.75rem;opacity:0;transition:.3s;}
.member:hover::after{opacity:1;transform:translateX(-50%) translateY(-4px);}
.join{background:#ebe7e2;border-radius:18px;text-align:center;padding:40px 20px;}
.join h2{margin-bottom:20px;}
.join input{padding:12px;margin:8px;width:260px;border-radius:8px;border:1px solid #ddd;font-size:.95rem;}
.join button{background:var(--primary);color:white;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;transition:.3s;}
.join button:hover{background:var(--accent);color:var(--primary);}
footer{background:var(--primary);color:white;text-align:center;padding:18px;font-size:.9rem;}
#adminModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);justify-content:center;align-items:center;z-index:3000;}
.modal-box{background:white;padding:30px;border-radius:8px;text-align:center;width:320px;box-shadow:0 15px 35px rgba(0,0,0,.2);}
.modal-box input{padding:10px;margin:8px;width:90%;border-radius:6px;border:1px solid #ccc;font-size:.95rem;}
.modal-box button{margin:5px;padding:10px 18px;border-radius:6px;border:none;cursor:pointer;transition:.3s;}
.modal-box button:hover{opacity:.85;}
.admin-dashboard{display:none;background:#f4f4f4;width:100%;min-height:100vh;padding:60px 6%;overflow-y:auto;}
.admin-tabs{display:flex;gap:10px;margin-bottom:20px;}
.admin-tab{padding:10px 18px;background:var(--primary);color:white;border-radius:6px;cursor:pointer;transition:.3s;}
.admin-tab.active{background:var(--accent);color:var(--primary);}
.admin-card{background:white;padding:15px;margin-bottom:10px;border-left:4px solid var(--primary-soft);box-shadow:0 2px 6px rgba(0,0,0,.08);}
.tab-content{display:none;}
.tab-content.active{display:block;}
</style>
</head>
<body>

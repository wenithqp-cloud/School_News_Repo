<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eldorado High School - News Broadcasting Club</title>

<style>

/* ================= ROOT COLORS ================= */
:root{
  --primary:#6b0f1a;
  --primary-soft:#8f2333;
  --accent:#f2c94c;
  --bg:#f4f1ec;
  --card:#ffffff;
  --text:#2f2f2f;
  --muted:#666;
}

/* ================= GLOBAL ================= */
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;}
html,body{height:100%;scroll-behavior:smooth;overflow-x:hidden;}
body{
  background:var(--bg);
  color:var(--text);
  line-height:1.7;
  letter-spacing:.3px;
}

section{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:8% 6%;
  opacity:0;
  transform:translateY(40px);
  transition:all .8s ease;
}

section.visible{
  opacity:1;
  transform:translateY(0);
}

/* ================= HEADER ================= */
.school-header{
  position:fixed;
  top:0;
  width:100%;
  background:rgba(107,15,26,.88);
  backdrop-filter:blur(10px);
  color:white;
  padding:14px 6%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:2px solid var(--accent);
  z-index:1000;
}

.header-left{display:flex;align-items:center;gap:14px;}
.header-left img{height:50px;}
.header-text h1{font-size:1.1rem;font-weight:600;}
.header-text span{font-size:.8rem;color:var(--accent);letter-spacing:1px;}

.school-header nav a{
  color:white;
  text-decoration:none;
  margin-left:22px;
  font-weight:500;
  font-size:.95rem;
  transition:.3s;
  position:relative;
  cursor:pointer;
}

.school-header nav a:hover,
.school-header nav a.active{
  color:var(--accent);
}

.school-header nav a.active::after{
  content:"";
  position:absolute;
  bottom:-6px;
  left:0;
  width:100%;
  height:2px;
  background:var(--accent);
}

/* ================= HERO ================= */
.hero{
  background:linear-gradient(135deg,var(--primary),var(--primary-soft));
  color:white;
  text-align:center;
}

.hero h1{
  font-size:2.7rem;
  font-weight:600;
  margin-bottom:18px;
}

.hero p{
  font-size:1.15rem;
  max-width:600px;
  margin-bottom:28px;
  opacity:.95;
}

.hero button{
  background:var(--accent);
  color:var(--primary);
  border:none;
  padding:14px 28px;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
  transition:.3s;
}

.hero button:hover{
  transform:translateY(-3px);
  box-shadow:0 6px 18px rgba(0,0,0,.15);
}

/* ================= BROADCASTS ================= */
.broadcasts{
  background:var(--card);
  border-radius:18px;
  box-shadow:0 15px 35px rgba(0,0,0,.05);
}

.broadcasts h2{
  margin-bottom:30px;
  font-size:1.8rem;
  font-weight:600;
}

.video-main{
  width:85%;
  max-width:900px;
}

.video-player{
  width:100%;
  height:50vh;
  border-radius:14px;
  border:none;
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}

.video-scroll{
  margin-top:20px;
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding-bottom:10px;
}

.video-scroll button{
  background:var(--primary);
  color:white;
  border:none;
  padding:10px 18px;
  border-radius:8px;
  font-size:.9rem;
  cursor:pointer;
  transition:.3s;
}

.video-scroll button:hover{
  background:var(--accent);
  color:var(--primary);
}

/* ================= TEAM ================= */
.team{
  text-align:center;
}

.team h2{
  margin-bottom:40px;
  font-size:1.8rem;
}

.team-grid{
  width:85%;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:40px;
}

.member{
  background:var(--card);
  padding:28px 20px;
  border-radius:18px;
  box-shadow:0 10px 25px rgba(0,0,0,.06);
  transition:.3s;
  position:relative;
  cursor:pointer;
}

.member:hover{
  transform:translateY(-6px);
  box-shadow:0 15px 35px rgba(0,0,0,.1);
}

.member img{
  width:110px;
  height:110px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:15px;
}

.member h3{
  font-size:1.1rem;
  margin-bottom:4px;
}

.member p{
  color:var(--muted);
  font-size:.9rem;
}

/* Tooltip */
.member::after{
  content:attr(data-contact);
  position:absolute;
  bottom:-38px;
  left:50%;
  transform:translateX(-50%);
  background:var(--primary);
  color:var(--accent);
  padding:6px 12px;
  border-radius:6px;
  font-size:.75rem;
  opacity:0;
  transition:.3s;
}

.member:hover::after{
  opacity:1;
  transform:translateX(-50%) translateY(-4px);
}

/* ================= JOIN ================= */
.join{
  background:#ebe7e2;
  border-radius:18px;
  text-align:center;
}

.join h2{
  margin-bottom:20px;
}

.join input{
  padding:12px;
  margin:8px;
  width:260px;
  border-radius:8px;
  border:1px solid #ddd;
  font-size:.95rem;
}

.join button{
  background:var(--primary);
  color:white;
  border:none;
  padding:12px 24px;
  border-radius:8px;
  cursor:pointer;
  transition:.3s;
}

.join button:hover{
  background:var(--accent);
  color:var(--primary);
}

/* ================= FOOTER ================= */
footer{
  background:var(--primary);
  color:white;
  text-align:center;
  padding:18px;
  font-size:.9rem;
}

</style>
</head>
<body>

<header class="school-header">
  <div class="header-left">
    <img src="footer_logo-584425766.png">
    <div class="header-text">
      <h1>Eldorado High School</h1>
      <span>News Broadcasting Club</span>
    </div>
  </div>
  <nav>
    <a onclick="scrollToSection('hero')">Home</a>
    <a onclick="scrollToSection('broadcasts')">Broadcasts</a>
    <a onclick="scrollToSection('team')">Team</a>
    <a onclick="scrollToSection('join')">Join</a>
  </nav>
</header>

<section id="hero" class="hero">
  <h1>Welcome to the News Broadcasting Club</h1>
  <p>Delivering school stories. Sharing student voices. Creating future journalists.</p>
  <button onclick="scrollToSection('broadcasts')">Watch Latest Broadcast</button>
</section>

<section id="broadcasts" class="broadcasts">
  <h2>Latest Broadcasts</h2>
  <div class="video-main">
    <iframe id="mainVideo" class="video-player" src=""></iframe>
  </div>
  <div class="video-scroll" id="videoScroll"></div>
</section>

<section id="team" class="team">
  <h2>Meet the Team</h2>
  <div class="team-grid" id="teamGrid"></div>
</section>

<section id="join" class="join">
  <h2>Join the Club</h2>
  <form onsubmit="submitForm(event)">
    <input type="text" placeholder="Your Name" required>
    <input type="email" placeholder="Your Email" required><br>
    <button type="submit">Submit</button>
  </form>
</section>

<footer>© 2026 Eldorado High School Broadcasting Club</footer>

<script>

function scrollToSection(id){
  document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

const sections=document.querySelectorAll("section");
const navLinks=document.querySelectorAll(".school-header nav a");

window.addEventListener("scroll",()=>{
  let current="";
  sections.forEach(section=>{
    const top=section.offsetTop-150;
    if(pageYOffset>=top){
      current=section.id;
      section.classList.add("visible");
    }
  });
  navLinks.forEach(link=>{
    link.classList.remove("active");
    if(link.getAttribute("onclick").includes(current)){
      link.classList.add("active");
    }
  });
});

function submitForm(e){
  e.preventDefault();
  alert("Thank you for signing up!");
  e.target.reset();
}

window.onload=()=>{
  document.querySelectorAll("section").forEach(s=>s.classList.add("visible"));
};

</script>

</body>
</html>

<script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.2/vanilla-tilt.min.js"></script>
<script>
// ===== TEAM MEMBERS =====
function loadTeamMembers(){
  const tM = JSON.parse(localStorage.getItem("teamMembers") || "[]");
  const grid = document.getElementById("teamGrid"); 
  grid.innerHTML = "";
  const manager = document.getElementById("teamManager"); 
  manager.innerHTML = "";

  tM.forEach((m, i) => {
    // TEAM GRID CARD
    const div = document.createElement("div"); 
    div.className = "member"; 
    div.setAttribute("data-contact", `${m.email || 'No email'}, ${m.phone || 'No phone'}`);

    // 3D container for tilt
    const logoContainer = document.createElement("div");
    logoContainer.className = "main-logo-container";
    logoContainer.style.position = "relative";
    logoContainer.style.width = "110px";
    logoContainer.style.height = "110px";
    logoContainer.style.transformStyle = "preserve-3d";
    logoContainer.setAttribute("data-tilt", "");
    logoContainer.setAttribute("data-tilt-max", "15");
    logoContainer.setAttribute("data-tilt-speed", "100");

    // Layered images
    const layers = [
      {src: m.img || "maroon.jpg", z: 0},       // base image
      // Add extra overlays if desired
      // {src: "maroon_overlay1.png", z: 5},
      // {src: "maroon_overlay2.png", z: 10}
    ];

    layers.forEach(layer => {
      const img = document.createElement("img");
      img.src = layer.src;
      img.style.position = "absolute";
      img.style.left = "0";
      img.style.right = "0";
      img.style.top = "0";
      img.style.margin = "auto";
      img.style.transform = `translateZ(${layer.z}px)`;
      img.style.width = "110px";
      img.style.height = "110px";
      img.style.borderRadius = "50%";
      img.style.objectFit = "cover";
      logoContainer.appendChild(img);
    });

    div.appendChild(logoContainer);

    // Name & role
    const h = document.createElement("h3"); 
    h.textContent = m.name; 
    div.appendChild(h);
    const p = document.createElement("p"); 
    p.textContent = m.role; 
    div.appendChild(p);

    grid.appendChild(div);

    // ADMIN PANEL CARD
    if(document.getElementById("teamTab").classList.contains("active")){
      const card = document.createElement("div"); 
      card.className = "admin-card";
      card.innerHTML = `<strong>${m.name}</strong><br>${m.role}<br>Email: ${m.email || ''} <button onclick="editEmail(${i})">Edit</button><br>Phone: ${m.phone || ''} <button onclick="editPhone(${i})">Edit</button><br>
      <button onclick="editTeamMember(${i})">Edit Name/Role/Image</button> <button onclick="deleteTeamMember(${i})">Delete</button>`;
      manager.appendChild(card);
    }
  });

  // Initialize Vanilla Tilt for all new logo containers
  VanillaTilt.init(document.querySelectorAll(".main-logo-container"), {
    max: 15,
    speed: 400,
    glare: true,
    "max-glare": 0.2,
  });
}
</script>

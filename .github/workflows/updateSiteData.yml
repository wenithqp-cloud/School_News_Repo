name: Update Site Data

on:
  workflow_dispatch:
    inputs:
      newData:
        description: 'New siteData JSON'
        required: true
        default: '{}'

jobs:
  update-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Update siteData.json
        run: |
          echo '${{ github.event.inputs.newData }}' > siteData.json
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add siteData.json
          git commit -m "Update site data via admin panel" || echo "No changes"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
